<html lang="en">
<head>

    <style>
        :root {
            --bg-color: #0a0c10;
            --term-bg: #111318;
            --text-color: #a9b1d6;
            --accent-green: #9ece6a;
            --accent-cyan: #7dcfff;
            --accent-purple: #bb9af7;
            --accent-yellow: #e0af68;
            --accent-red: #f7768e;
            --font-mono: 'Fira Code', 'Cascadia Code', 'Consolas', 'Courier New', monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 14px;
            line-height: 1.6;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* CRT Scanline & Glow Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 3px, 4px 100%;
            pointer-events: none;
        }

        .terminal-window {
            width: 95%;
            max-width: 1000px;
            height: 92vh;
            background-color: var(--term-bg);
            border: 1px solid #2a2e3a;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(125, 207, 255, 0.08), 0 25px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .terminal-header {
            background-color: #1a1d24;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #2a2e3a;
            border-radius: 10px 10px 0 0;
        }

        .terminal-buttons { display: flex; gap: 8px; }
        .btn { width: 13px; height: 13px; border-radius: 50%; }
        .btn-red { background-color: #ff5f57; box-shadow: 0 0 4px #ff5f57; }
        .btn-yellow { background-color: #febc2e; box-shadow: 0 0 4px #febc2e; }
        .btn-green { background-color: #28c840; box-shadow: 0 0 4px #28c840; }

        .terminal-title {
            margin-left: 16px;
            color: #565f71;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .terminal-body {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .terminal-body::-webkit-scrollbar { width: 8px; }
        .terminal-body::-webkit-scrollbar-track { background: var(--term-bg); }
        .terminal-body::-webkit-scrollbar-thumb { background: #2a2e3a; border-radius: 4px; }

        .output-line { margin-bottom: 6px; white-space: pre-wrap; word-wrap: break-word; }
        .prompt { color: var(--accent-green); font-weight: bold; }
        .command { color: var(--text-color); }
        
        .input-line {
            display: flex;
            align-items: center;
            padding: 0 24px 24px 24px;
        }

        .input-field {
            background: transparent;
            border: none;
            color: var(--text-color);
            font-family: var(--font-mono);
            font-size: 14px;
            flex: 1;
            outline: none;
            margin-left: 8px;
            caret-color: var(--accent-green);
        }

        /* Syntax Highlighting Classes */
        .kw { color: var(--accent-purple); font-weight: bold; }
        .str { color: var(--accent-green); }
        .func { color: var(--accent-cyan); }
        .num { color: var(--accent-yellow); }
        .comment { color: #565f71; font-style: italic; }
        .link { color: var(--accent-cyan); text-decoration: none; border-bottom: 1px dashed var(--accent-cyan); transition: all 0.2s; }
        .link:hover { color: var(--accent-green); border-bottom-style: solid; }
        .highlight { color: var(--accent-yellow); font-weight: bold; }
        .error { color: var(--accent-red); }
        .bold { font-weight: bold; }

        /* Robust ASCII Art Container */
        .ascii-art {
            color: var(--accent-cyan);
            font-size: 12px;
            line-height: 1.1;
            margin: 16px 0;
            font-weight: bold;
            white-space: pre; /* Guarantees ASCII alignment */
            overflow-x: auto;
        }

        .neofetch-grid {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 24px;
            margin: 12px 0;
        }
        .neofetch-label { color: var(--accent-purple); font-weight: bold; min-width: 140px; }
        .neofetch-value { color: var(--text-color); }

        .tree-line { color: #565f71; }

        @media (max-width: 768px) {
            .ascii-art { font-size: 8px; }
            body { font-size: 12px; }
            .input-field { font-size: 12px; }
            .terminal-body { padding: 16px; }
            .input-line { padding: 0 16px 16px 16px; }
            .neofetch-grid { grid-template-columns: 1fr; gap: 4px; }
            .neofetch-label { min-width: auto; }
        }
    </style>

            default:
                printLine(`<span class="error">NameError</span>: name '<span class="str">${cleanCmd}</span>' is not defined. Type '<span class="func">help</span>' for available commands.`);
        }
    }

    commandInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            const cmd = this.value;
            this.value = '';
            processCommand(cmd);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (historyIndex > 0) {
                historyIndex--;
                this.value = commandHistory[historyIndex];
            }
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex < commandHistory.length - 1) {
                historyIndex++;
                this.value = commandHistory[historyIndex];
            } else {
                historyIndex = commandHistory.length;
                this.value = '';
            }
        }
    });
