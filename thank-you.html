<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | Arastu Thakur</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --panel: rgba(15, 15, 15, 0.88);
      --border: rgba(255, 255, 255, 0.08);
      --text: #f4f4f5;
      --muted: #9ca3af;
      --accent: #7dd3fc;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(125, 211, 252, 0.14), transparent 34%),
        radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.12), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      padding: 48px 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      text-align: center;
    }

    .eyebrow {
      font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      font-size: 0.82rem;
      margin: 0 0 18px;
    }

    h1 {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      line-height: 1.05;
    }

    p {
      margin: 18px auto 0;
      max-width: 52ch;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
    }

    .actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.95rem 1.35rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
      border: 1px solid transparent;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, #e0f2fe, #7dd3fc);
      color: #020617;
    }

    .btn-outline {
      background: transparent;
      border-color: rgba(255, 255, 255, 0.12);
      color: var(--text);
    }

    @media (max-width: 640px) {
      .card {
        padding: 36px 20px;
        border-radius: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Message Sent</p>
    <h1>Thank you, will connect soon.</h1>
    <p>Your message has been received. I’ll review it and get back to you as soon as possible.</p>
    <div class="actions">
      <a class="btn btn-primary" href="index.html">Back to Portfolio</a>
      <a class="btn btn-outline" href="mailto:arustuthakur@gmail.com">Email Directly</a>
    </div>
  </main>
</body>
</html>
